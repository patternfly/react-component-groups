name: pr-preview
on:
  pull_request_target:
  issue_comment:
    types: [created]
jobs:
  check-permissions:
    uses: patternfly/.github/.github/workflows/check-team-membership.yml@fdb52a63a2220ec8a3b6c2d43f312cda708ffa06
    secrets: inherit

  build-upload:
    runs-on: ubuntu-latest
    needs: check-permissions
    if: needs.check-permissions.outputs.allowed == 'true'
    env:
      SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      GH_PR_TOKEN: ${{ secrets.GH_PR_TOKEN }}
      GH_PR_NUM:   ${{ needs.check-permissions.outputs.pr-number }}
    steps:
      - uses: actions/checkout@v4
      # Yes, we really want to checkout the PR
      - run: |
          git fetch origin pull/$GH_PR_NUM/head:tmp
          git checkout tmp

      - run: |
          git rev-parse origin/main
          git rev-parse HEAD
          git rev-parse origin/main..HEAD
          git log origin/main..HEAD --format="%b"

      # Yes, we really want to checkout the PR
      # Injected by generate-workflows.js
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        id: npm-cache
        name: Load npm deps from cache
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-npm-14-${{ secrets.CACHE_VERSION }}-${{ hashFiles('package-lock.json') }}
      - run: npm install --frozen-lockfile --legacy-peer-deps
        if: steps.yarn-cache.outputs.cache-hit != 'true'
      - run: npm run build
        name: Build component groups
      - uses: actions/cache@v4
        id: docs-cache
        name: Load webpack cache
        with:
          path: '.cache'
          key: ${{ runner.os }}-v4-${{ hashFiles('yarn.lock') }}
      - run: npm run build:docs
        name: Build docs
      - run: node .github/upload-preview.js packages/module/public
        name: Upload docs
        if: always()
      - run: npx puppeteer browsers install chrome
        name: Install Chrome for Puppeteer
      - run: npm run serve:docs & npm run test:a11y
        name: a11y tests
      - run: node .github/upload-preview.js packages/module/coverage
        name: Upload a11y report
        if: always()
